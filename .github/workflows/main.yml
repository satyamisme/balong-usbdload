name: Build All Platforms

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc
          cache: true

      - name: Generate printf.h shim
        shell: msys2 {0}
        run: |
          cat > printf.h << 'EOF'
          #pragma once
          #include <stdio.h>
          EOF

      - name: Build all tools
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          
          # Main USB download tool
          gcc -DWIN32 -DINITGUID -I. \
            -o balong-usbdload.exe \
            balong-usbdload.c parts.c patcher.c exploit.c \
            -lws2_32 -lsetupapi
          
          # Partition table tools
          gcc -I. -o ptable-editor.exe    ptable-editor.c   parts.c
          gcc -I. -o ptable-list.exe      ptable-list.c     parts.c
          gcc -I. -o ptable-injector.exe  ptable-injector.c parts.c
          
          # USB loader packer/unpacker
          gcc -I. -o usbloader-packer.exe usbloader-packer.c
          
          # Standalone patcher
          gcc -I. -o loader-patch.exe loader-patch.c patcher.c
          
          echo "Build complete!"

      - name: Package Windows ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path `
            balong-usbdload.exe, `
            ptable-editor.exe, `
            ptable-list.exe, `
            ptable-injector.exe, `
            usbloader-packer.exe, `
            loader-patch.exe, `
            README.md, `
            USBLOADER-PACKER-README.md `
            -DestinationPath dist/balong-usbdload-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-windows
          path: dist/balong-usbdload-windows-x64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Generate printf.h shim
        run: |
          cat > printf.h << 'EOF'
          #pragma once
          #include <stdio.h>
          EOF

      - name: Build all tools
        run: |
          # Main USB download tool
          gcc -I. \
            -o balong-usbdload \
            balong-usbdload.c parts.c patcher.c exploit.c
          
          # Partition table tools
          gcc -I. -o ptable-editor    ptable-editor.c   parts.c
          gcc -I. -o ptable-list      ptable-list.c     parts.c
          gcc -I. -o ptable-injector  ptable-injector.c parts.c
          
          # USB loader packer/unpacker
          gcc -I. -o usbloader-packer usbloader-packer.c
          
          # Standalone patcher
          gcc -I. -o loader-patch loader-patch.c patcher.c
          
          echo "Build complete!"

      - name: Package Linux tarball
        run: |
          mkdir -p dist
          tar -czvf dist/balong-usbdload-linux-x64.tar.gz \
            balong-usbdload \
            ptable-editor \
            ptable-list \
            ptable-injector \
            usbloader-packer \
            loader-patch \
            README.md \
            USBLOADER-PACKER-README.md

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-linux
          path: dist/balong-usbdload-linux-x64.tar.gz

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: balong-usbdload-windows
          path: dist/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: balong-usbdload-linux
          path: dist/

      - name: Get version tag
        id: version
        run: |
          DATE=$(date +'%Y.%m.%d')
          SHA=${GITHUB_SHA::7}
          echo "tag=v${DATE}-${SHA}" >> $GITHUB_OUTPUT
          echo "date=$DATE"          >> $GITHUB_OUTPUT
          echo "sha=$SHA"            >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "balong-usbdload ${{ steps.version.outputs.tag }}"
          body: |
            ## balong-usbdload Build

            **Date:** ${{ steps.version.outputs.date }}
            **Commit:** [`${{ steps.version.outputs.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **Branch:** `${{ github.ref_name }}`

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows 64-bit | `balong-usbdload-windows-x64.zip` |
            | Linux 64-bit   | `balong-usbdload-linux-x64.tar.gz` |

            ### Included Tools
            | Binary | Description |
            |--------|-------------|
            | `balong-usbdload` | Emergency USB loader (main tool) |
            | `loader-patch`    | Automatic patcher (creates usblsafe.bin) |
            | `ptable-editor`   | Partition table dump/build |
            | `ptable-list`     | Partition table viewer |
            | `ptable-injector` | Partition table injector into loader |
            | `usbloader-packer`| USB loader packer/unpacker |

            ### Usage Examples

            ```bash
            # Load patched usbloader (V7R22/E5785)
            balong-usbdload -p COM3 -x3 usbloader_patched.bin

            # Create safe loader from original
            loader-patch -o usblsafe.bin -b usbloader.bin

            # Unpack usbloader
            usbloader-packer -u usbloader.bin -d unpacked/

            # Show partition table
            ptable-list ptable.bin
