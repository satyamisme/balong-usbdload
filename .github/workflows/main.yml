name: Build balong-usbdload

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build-windows:
    name: build-windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 (MINGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc

      - name: Create printf.h shim
        shell: msys2 {0}
        run: |
          cat > printf.h << 'EOF'
          #pragma once
          #include <stdio.h>
          EOF

      - name: Build all tools
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"

          # -DINITGUID forces GUID_DEVCLASS_PORTS symbol instantiation from devguid.h
          gcc -DWIN32 -DINITGUID -I. \
            -o balong-usbdload.exe \
            balong-usbdload.c parts.c patcher.c exploit.c \
            -lws2_32 -lsetupapi

          gcc -I. -o ptable-editor.exe    ptable-editor.c   parts.c
          gcc -I. -o ptable-list.exe      ptable-list.c     parts.c
          gcc -I. -o ptable-injector.exe  ptable-injector.c parts.c
          gcc -I. -o patcher.exe          patcher.c
          gcc -I. -o loader-patch.exe     loader-patch.c
          gcc -I. -o usbloader-packer.exe usbloader-packer.c

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-windows
          path: "*.exe"
          if-no-files-found: error

  build-linux:
    name: build-linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build all tools
        run: |
          gcc -I. -o balong-usbdload \
            balong-usbdload.c parts.c patcher.c exploit.c

          gcc -I. -o ptable-editor    ptable-editor.c   parts.c
          gcc -I. -o ptable-list      ptable-list.c     parts.c
          gcc -I. -o ptable-injector  ptable-injector.c parts.c
          gcc -I. -o patcher          patcher.c
          gcc -I. -o loader-patch     loader-patch.c
          gcc -I. -o usbloader-packer usbloader-packer.c

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-linux
          path: |
            balong-usbdload
            ptable-editor
            ptable-list
            ptable-injector
            patcher
            loader-patch
            usbloader-packer
          if-no-files-found: error

  release:
    name: Create Release
    needs: [ build-windows, build-linux ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: balong-usbdload-windows
          path: dist/windows

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: balong-usbdload-linux
          path: dist/linux

      - name: Package artifacts
        run: |
          cd dist/windows && zip -j ../balong-usbdload-windows.zip *.exe
          cd dist/linux   && tar czf ../balong-usbdload-linux.tar.gz *

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/balong-usbdload-windows.zip
            dist/balong-usbdload-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
