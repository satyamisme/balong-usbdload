name: Build Windows

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc
          cache: true

      - name: Generate printf.h shim
        shell: msys2 {0}
        run: |
          cat > printf.h << 'EOF'
          #pragma once
          #include <stdio.h>
          EOF

      - name: Build
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          gcc -DWIN32 -DINITGUID -I. \
            -o balong-usbdload.exe \
            balong-usbdload.c parts.c patcher.c exploit.c \
            -lws2_32 -lsetupapi
          gcc -I. -o ptable-editor.exe    ptable-editor.c   parts.c
          gcc -I. -o ptable-list.exe      ptable-list.c     parts.c
          gcc -I. -o ptable-injector.exe  ptable-injector.c parts.c
          gcc -I. -o usbloader-packer.exe usbloader-packer.c

      - name: Package ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path `
            balong-usbdload.exe, `
            ptable-editor.exe, `
            ptable-list.exe, `
            ptable-injector.exe, `
            usbloader-packer.exe, `
            README.md, `
            USBLOADER-PACKER-README.md `
            -DestinationPath dist/balong-usbdload-windows-x64.zip

      - name: Upload artifact (Actions tab)
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-windows
          path: dist/balong-usbdload-windows-x64.zip

      - name: Get version info
        id: version
        shell: pwsh
        run: |
          $date = Get-Date -Format "yyyy.MM.dd"
          $sha  = "${{ github.sha }}".Substring(0,7)
          $tag  = "v$date-$sha"
          echo "tag=$tag"         >> $env:GITHUB_OUTPUT
          echo "date=$date"       >> $env:GITHUB_OUTPUT
          echo "sha=$sha"         >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "balong-usbdload ${{ steps.version.outputs.tag }}"
          body: |
            ## balong-usbdload Windows Build

            **Date:** ${{ steps.version.outputs.date }}
            **Commit:** [`${{ steps.version.outputs.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **Branch:** `${{ github.ref_name }}`

            ### What's included
            | File | Description |
            |------|-------------|
            | `balong-usbdload.exe` | Main USB download tool |
            | `ptable-editor.exe`   | Partition table editor |
            | `ptable-list.exe`     | Partition table lister |
            | `ptable-injector.exe` | Partition table injector |
            | `usbloader-packer.exe`| USB loader packer |

            ### Download
            Extract the ZIP below and run the `.exe` directly — no install needed.

            ### Changelog
            See [commit history](https://github.com/${{ github.repository }}/commits/master)
          files: dist/balong-usbdload-windows-x64.zip
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
