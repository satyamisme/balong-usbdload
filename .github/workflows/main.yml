name: Build All Architectures

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # Allow manual trigger

jobs:

  # ============================================================
  # LINUX x86_64 (native)
  # ============================================================
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make

      - name: Build
        run: make all

      - name: Collect binaries
        run: |
          mkdir -p dist/linux-x86_64
          cp balong-usbdload ptable-injector loader-patch ptable-list ptable-editor usbloader-packer dist/linux-x86_64/
          cp *.bin dist/linux-x86_64/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-linux-x86_64
          path: dist/linux-x86_64/

  # ============================================================
  # LINUX x86 32-bit
  # ============================================================
  linux-x86:
    name: Linux x86 (32-bit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make gcc-multilib

      - name: Build
        run: |
          make clean
          make all CFLAGS="-O2 -g -Wno-unused-result -m32" CC="gcc -m32"

      - name: Collect binaries
        run: |
          mkdir -p dist/linux-x86
          cp balong-usbdload ptable-injector loader-patch ptable-list ptable-editor usbloader-packer dist/linux-x86/
          cp *.bin dist/linux-x86/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-linux-x86
          path: dist/linux-x86/

  # ============================================================
  # LINUX ARM 32-bit (armhf / armv7)
  # ============================================================
  linux-armhf:
    name: Linux ARMhf (armv7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf make

      - name: Build
        run: |
          make clean
          make all CC=arm-linux-gnueabihf-gcc

      - name: Collect binaries
        run: |
          mkdir -p dist/linux-armhf
          cp balong-usbdload ptable-injector loader-patch ptable-list ptable-editor usbloader-packer dist/linux-armhf/
          cp *.bin dist/linux-armhf/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-linux-armhf
          path: dist/linux-armhf/

  # ============================================================
  # LINUX ARM 32-bit soft-float (armel)
  # ============================================================
  linux-armel:
    name: Linux ARMel (armel soft-float)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabi make

      - name: Build
        run: |
          make clean
          make all CC=arm-linux-gnueabi-gcc

      - name: Collect binaries
        run: |
          mkdir -p dist/linux-armel
          cp balong-usbdload ptable-injector loader-patch ptable-list ptable-editor usbloader-packer dist/linux-armel/
          cp *.bin dist/linux-armel/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-linux-armel
          path: dist/linux-armel/

  # ============================================================
  # LINUX ARM64 / AArch64
  # ============================================================
  linux-arm64:
    name: Linux ARM64 (AArch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu make

      - name: Build
        run: |
          make clean
          make all CC=aarch64-linux-gnu-gcc

      - name: Collect binaries
        run: |
          mkdir -p dist/linux-arm64
          cp balong-usbdload ptable-injector loader-patch ptable-list ptable-editor usbloader-packer dist/linux-arm64/
          cp *.bin dist/linux-arm64/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-linux-arm64
          path: dist/linux-arm64/

  # ============================================================
  # LINUX MIPS (big-endian, for some embedded routers)
  # ============================================================
  linux-mips:
    name: Linux MIPS (big-endian)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mips-linux-gnu make

      - name: Build
        run: |
          make clean
          make all CC=mips-linux-gnu-gcc

      - name: Collect binaries
        run: |
          mkdir -p dist/linux-mips
          cp balong-usbdload ptable-injector loader-patch ptable-list ptable-editor usbloader-packer dist/linux-mips/
          cp *.bin dist/linux-mips/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-linux-mips
          path: dist/linux-mips/

  # ============================================================
  # LINUX MIPSEL (little-endian)
  # ============================================================
  linux-mipsel:
    name: Linux MIPSEL (little-endian)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mipsel-linux-gnu make

      - name: Build
        run: |
          make clean
          make all CC=mipsel-linux-gnu-gcc

      - name: Collect binaries
        run: |
          mkdir -p dist/linux-mipsel
          cp balong-usbdload ptable-injector loader-patch ptable-list ptable-editor usbloader-packer dist/linux-mipsel/
          cp *.bin dist/linux-mipsel/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-linux-mipsel
          path: dist/linux-mipsel/

  # ============================================================
  # macOS x86_64
  # ============================================================
  macos-x86_64:
    name: macOS x86_64
    runs-on: macos-13   # Last Intel runner
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install make

      - name: Build
        run: make all

      - name: Collect binaries
        run: |
          mkdir -p dist/macos-x86_64
          cp balong-usbdload ptable-injector loader-patch ptable-list ptable-editor usbloader-packer dist/macos-x86_64/
          cp *.bin dist/macos-x86_64/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-macos-x86_64
          path: dist/macos-x86_64/

  # ============================================================
  # macOS ARM64 (Apple Silicon M1/M2/M3)
  # ============================================================
  macos-arm64:
    name: macOS ARM64 (Apple Silicon)
    runs-on: macos-latest  # M1/M2 runner
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install make

      - name: Build
        run: make all

      - name: Collect binaries
        run: |
          mkdir -p dist/macos-arm64
          cp balong-usbdload ptable-injector loader-patch ptable-list ptable-editor usbloader-packer dist/macos-arm64/
          cp *.bin dist/macos-arm64/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-macos-arm64
          path: dist/macos-arm64/

  # ============================================================
  # WINDOWS x64 (via MinGW cross-compile on Linux)
  # ============================================================
  windows-x64:
    name: Windows x64 (MinGW)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 make

      - name: Build
        run: |
          make clean
          # Build each target manually with WIN32 defined and .exe suffix
          x86_64-w64-mingw32-gcc -O2 -g -Wno-unused-result -DWIN32 \
            -I winbuild \
            balong-usbdload.c parts.c patcher.c exploit.c \
            winbuild/getopt.c winbuild/printf.c \
            -o balong-usbdload.exe

          x86_64-w64-mingw32-gcc -O2 -g -Wno-unused-result -DWIN32 \
            -I winbuild \
            ptable-injector.c parts.c \
            winbuild/getopt.c winbuild/printf.c \
            -o ptable-injector.exe

          x86_64-w64-mingw32-gcc -O2 -g -Wno-unused-result -DWIN32 \
            -I winbuild \
            loader-patch.c patcher.c \
            winbuild/getopt.c winbuild/printf.c \
            -o loader-patch.exe

          x86_64-w64-mingw32-gcc -O2 -g -Wno-unused-result -DWIN32 \
            -I winbuild \
            ptable-list.c parts.c \
            winbuild/getopt.c winbuild/printf.c \
            -o ptable-list.exe

          x86_64-w64-mingw32-gcc -O2 -g -Wno-unused-result -DWIN32 \
            -I winbuild \
            ptable-editor.c parts.c \
            winbuild/getopt.c winbuild/printf.c \
            -o ptable-editor.exe

          x86_64-w64-mingw32-gcc -O2 -g -Wno-unused-result -DWIN32 \
            -I winbuild \
            usbloader-packer.c \
            winbuild/getopt.c winbuild/printf.c \
            -o usbloader-packer.exe

      - name: Collect binaries
        run: |
          mkdir -p dist/windows-x64
          cp *.exe dist/windows-x64/
          cp *.bin dist/windows-x64/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-windows-x64
          path: dist/windows-x64/

  # ============================================================
  # WINDOWS x86 32-bit (MinGW)
  # ============================================================
  windows-x86:
    name: Windows x86 32-bit (MinGW)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-i686 make

      - name: Build
        run: |
          make clean
          i686-w64-mingw32-gcc -O2 -g -Wno-unused-result -DWIN32 \
            -I winbuild \
            balong-usbdload.c parts.c patcher.c exploit.c \
            winbuild/getopt.c winbuild/printf.c \
            -o balong-usbdload.exe

          i686-w64-mingw32-gcc -O2 -g -Wno-unused-result -DWIN32 \
            -I winbuild \
            ptable-injector.c parts.c \
            winbuild/getopt.c winbuild/printf.c \
            -o ptable-injector.exe

          i686-w64-mingw32-gcc -O2 -g -Wno-unused-result -DWIN32 \
            -I winbuild \
            loader-patch.c patcher.c \
            winbuild/getopt.c winbuild/printf.c \
            -o loader-patch.exe

          i686-w64-mingw32-gcc -O2 -g -Wno-unused-result -DWIN32 \
            -I winbuild \
            ptable-list.c parts.c \
            winbuild/getopt.c winbuild/printf.c \
            -o ptable-list.exe

          i686-w64-mingw32-gcc -O2 -g -Wno-unused-result -DWIN32 \
            -I winbuild \
            ptable-editor.c parts.c \
            winbuild/getopt.c winbuild/printf.c \
            -o ptable-editor.exe

          i686-w64-mingw32-gcc -O2 -g -Wno-unused-result -DWIN32 \
            -I winbuild \
            usbloader-packer.c \
            winbuild/getopt.c winbuild/printf.c \
            -o usbloader-packer.exe

      - name: Collect binaries
        run: |
          mkdir -p dist/windows-x86
          cp *.exe dist/windows-x86/
          cp *.bin dist/windows-x86/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: balong-usbdload-windows-x86
          path: dist/windows-x86/

  # ============================================================
  # RELEASE — bundle everything into one release on tag push
  # ============================================================
  release:
    name: Create Release
    needs:
      - linux-x86_64
      - linux-x86
      - linux-armhf
      - linux-armel
      - linux-arm64
      - linux-mips
      - linux-mipsel
      - macos-x86_64
      - macos-arm64
      - windows-x64
      - windows-x86
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create zip archives per platform
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done
          cd ..
          ls -lh *.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
          body: |
            ## balong-usbdload — Multi-Architecture Release

            ### Included binaries per archive:
            - `balong-usbdload` — Main USB boot loader tool
            - `loader-patch` — Patch usbloader.bin to disable flash erase (make usblsafe)
            - `ptable-injector` — View/extract/replace partition table in usbloader
            - `ptable-list` — Display partition table from .bin file
            - `ptable-editor` — Edit partition table entries
            - `usbloader-packer` — Pack/unpack usbloader image components
            - All `*.bin` usbloader/usblsafe files

            ### Platform archives:
            | Archive | Target |
            |---|---|
            | `linux-x86_64` | Linux 64-bit (most PCs) |
            | `linux-x86` | Linux 32-bit |
            | `linux-armhf` | Linux ARM 32-bit hard-float (Raspberry Pi etc.) |
            | `linux-armel` | Linux ARM 32-bit soft-float |
            | `linux-arm64` | Linux ARM 64-bit |
            | `linux-mips` | Linux MIPS big-endian |
            | `linux-mipsel` | Linux MIPS little-endian |
            | `macos-x86_64` | macOS Intel |
            | `macos-arm64` | macOS Apple Silicon (M1/M2/M3) |
            | `windows-x64` | Windows 64-bit |
            | `windows-x86` | Windows 32-bit |

            ### Usage for E5785-92c (V7R22):
            ```
            balong-usbdload -x 3 usblsafe-e5785.bin
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
